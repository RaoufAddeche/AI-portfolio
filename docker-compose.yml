# Stack portfolio : 3 services (db, backend, frontend).
# n8n, Ollama et le sidecar MCP ont été retirés (voir README).
services:
  db:
    image: postgres:15
    container_name: portfolio-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      # Port hôte configurable (évite les conflits avec d'autres Postgres locaux).
      # Le backend, lui, joint la DB via le réseau Docker sur 5432.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - ./volumes/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - portfolio_net

  backend:
    build: ./dashboard/backend
    container_name: portfolio-backend
    restart: unless-stopped
    # Applique les migrations Alembic puis démarre l'API.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USERNAME=${GITHUB_USERNAME}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - SYNC_TOKEN=${SYNC_TOKEN:-}
      - CHAT_RATE_PER_MINUTE=${CHAT_RATE_PER_MINUTE:-6}
      - CHAT_DAILY_LIMIT=${CHAT_DAILY_LIMIT:-300}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - CONTACT_NOTIFY_TO=${CONTACT_NOTIFY_TO:-addeche.raouf@gmail.com}
      - CONTACT_FROM=${CONTACT_FROM:-Portfolio <onboarding@resend.dev>}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:8000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio_net

  frontend:
    build: ./dashboard/frontend
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - portfolio_net

networks:
  portfolio_net:
